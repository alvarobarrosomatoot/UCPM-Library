<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hardware Store Checkout</title>

  <!-- =========================================================
       1) ONETRUST REQUIRED SCRIPTS (UNCHANGED)
  ========================================================== -->
  <script>
    window.OtSdk = window.OtSdk || function () {
      (OtSdk.q = OtSdk.q || []).push(arguments);
    };
  </script>

  <script
    src="https://privacyportaltrial.onetrust.com/consent-embedded-forms/consent-receipt-scripts/OtFormStub.js"
    data-id="f7fe861d-66c3-467c-b74c-c2532fab3f33"
    worker="https://consent-api.onetrust.com">
  </script>

  <!-- =========================================================
       2) STYLES – HOME DEPOT–LIKE CHECKOUT
  ========================================================== -->
  <style>
    :root {
      --orange: #f96302;
      --dark: #111;
      --muted: #6b7280;
      --bg: #f4f5f7;
      --card: #ffffff;
      --border: #e5e7eb;
      --radius: 10px;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--dark);
    }

    /* ===== HEADER ===== */
    header {
      background: #000;
      color: #fff;
      padding: 18px 24px;
    }

    header strong {
      color: var(--orange);
      font-size: 22px;
      letter-spacing: 0.5px;
    }

    header span {
      font-size: 14px;
      margin-left: 12px;
      color: #d1d5db;
    }

    /* ===== LAYOUT ===== */
    main {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    @media (max-width: 900px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    h2 {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 800;
    }

    /* ===== EMAIL ===== */
    .email-field input {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      font-size: 15px;
    }

    /* ===== CART ===== */
    .cart-item {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      background: #ddd;
    }

    .cart-item strong {
      font-size: 14px;
    }

    .cart-item span {
      font-size: 13px;
      color: var(--muted);
    }

    /* ===== PAYMENT ===== */
    .field {
      margin-bottom: 12px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ===== SUMMARY ===== */
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .summary-row.total {
      font-weight: 800;
      font-size: 16px;
      margin-top: 14px;
    }

    .cta {
      margin-top: 18px;
      background: var(--orange);
      border: none;
      color: #fff;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 800;
      border-radius: var(--radius);
      cursor: pointer;
    }

    /* ===== ONETRUST VISUAL CLEANUP (UNCHANGED FUNCTIONALLY) ===== */
    #ot-container {
      margin-top: 16px;
    }

    .ot-consent-inline,
    .otwf-content,
    .ot-form,
    .ot-form-content,
    .ot-el {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      font-family: inherit !important;
    }
  </style>
</head>

<body>

<header>
  <strong>HARDWARE PRO</strong>
  <span>Secure Checkout · Easy Returns</span>
</header>

<main>

  <!-- LEFT COLUMN -->
  <section class="card">
    <h2>Contact</h2>
    <div class="email-field">
      <!-- ID PRESERVED -->
      <input id="email" type="email" placeholder="you@example.com" required />
    </div>

    <h2 style="margin-top:24px;">Your Cart</h2>

    <!-- Demo cart items -->
    <div class="cart-item">
      <img alt="">
      <div>
        <strong>18V Cordless Drill</strong><br>
        <span>Qty: 1</span>
      </div>
      <strong>€129.00</strong>
    </div>

    <div class="cart-item">
      <img alt="">
      <div>
        <strong>Heavy‑Duty Tool Box</strong><br>
        <span>Qty: 1</span>
      </div>
      <strong>€59.00</strong>
    </div>

    <h2 style="margin-top:24px;">Payment</h2>

    <!-- Dummy / Prefilled -->
    <div class="field">
      <label>Card number</label>
      <input value="4242 4242 4242 4242">
    </div>

    <div class="field">
      <label>Name on card</label>
      <input value="JOHN SMITH">
    </div>

    <div class="grid-2">
      <div class="field">
        <label>Expiry</label>
        <input value="12/28">
      </div>
      <div class="field">
        <label>CVC</label>
        <input value="123">
      </div>
    </div>

    <h2 style="margin-top:24px;">Consent</h2>
    <!-- OneTrust mounts here -->
    <div id="ot-container"></div>
  </section>

  <!-- RIGHT COLUMN -->
  <aside class="card">
    <h2>Order Summary</h2>

    <div class="summary-row">
      <span>Subtotal</span>
      <span>€188.00</span>
    </div>
    <div class="summary-row">
      <span>Shipping</span>
      <span>€9.95</span>
    </div>
    <div class="summary-row">
      <span>Tax</span>
      <span>€19.80</span>
    </div>

    <div class="summary-row total">
      <span>Total</span>
      <span>€217.75</span>
    </div>

    <button class="cta">Place Order</button>
  </aside>

</main>

<!-- =========================================================
     4) JAVASCRIPT – UNCHANGED FUNCTIONALITY
========================================================== -->
<script>
  const CP_ID = "8dc37d20-2061-422b-b45e-a3f01fa12a10";

  function whenOTReady(callback) {
    const timer = setInterval(() => {
      if (window.OneTrust && window.OneTrust.webform && window.OneTrust.webform.InstallCP) {
        clearInterval(timer);
        callback();
      }
    }, 80);
  }

  window.addEventListener("DOMContentLoaded", () => {
    whenOTReady(() => {
      OneTrust.webform.InstallCP(CP_ID, {
        target: "#ot-container"
      });
    });
  });
</script>

</body>
</html>
